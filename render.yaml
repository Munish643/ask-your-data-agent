services:
  - type: web
    name: askdata-api
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    disk:
      name: askdata-storage
      mountPath: /app/storage
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: askdata-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: askdata-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: STORAGE_DIR
        value: /app/storage
      - key: INGESTION_MODE
        value: inline
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_GENERATION_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_EMBEDDING_DIMENSION
        value: "768"
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: "500"
      - key: LLM_TIMEOUT_SECONDS
        value: "30"
      - key: LLM_STREAM_TIMEOUT_SECONDS
        value: "60"
      - key: RETRIEVAL_LIMIT
        value: "4"
      - key: RETRIEVAL_SOURCE_CONTENT_CHARS
        value: "1400"

  - type: web
    name: askdata-web
    runtime: docker
    rootDir: frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_HOST
        fromService:
          type: web
          name: askdata-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME

databases:
  - name: askdata-db
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: askdata
    user: askdata_app
    ipAllowList: []
