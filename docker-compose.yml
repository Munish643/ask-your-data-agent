services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: askdata
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d askdata"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/askdata
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      STORAGE_DIR: /app/storage
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-dev-change-me-session-secret}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
      AUTH_ALLOW_DEV_FALLBACK: ${AUTH_ALLOW_DEV_FALLBACK:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_GENERATION_MODEL: ${GEMINI_GENERATION_MODEL:-gemini-2.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_DIMENSION: ${GEMINI_EMBEDDING_DIMENSION:-768}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-5}
      RETRIEVAL_LIMIT: ${RETRIEVAL_LIMIT:-4}
      RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE:-0.2}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      WEB_SEARCH_LIMIT: ${WEB_SEARCH_LIMIT:-5}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-8}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/askdata
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-dev-change-me-session-secret}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
      AUTH_ALLOW_DEV_FALLBACK: ${AUTH_ALLOW_DEV_FALLBACK:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_DIMENSION: ${GEMINI_EMBEDDING_DIMENSION:-768}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-5}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      WEB_SEARCH_LIMIT: ${WEB_SEARCH_LIMIT:-5}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-8}
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=1",
        "--prefetch-multiplier=1",
        "--max-tasks-per-child=10",
      ]
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_storage:
