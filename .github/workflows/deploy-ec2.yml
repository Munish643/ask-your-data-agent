name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Pull latest code and restart Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
            set -euo pipefail

            APP_DIR="$HOME/ask-your-data-agent"
            REPO_URL="https://github.com/Munish643/ask-your-data-agent.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            if docker info >/dev/null 2>&1; then
              docker compose up --build -d
              docker image prune -f
            else
              sudo docker compose up --build -d
              sudo docker image prune -f
            fi
          EOF
