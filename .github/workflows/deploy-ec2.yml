name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Pull latest code and restart Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST}" ]; then
            echo "::error title=Missing EC2_HOST secret::Set EC2_HOST to your EC2 public IP or public DNS."
            exit 1
          fi

          if [ -z "${EC2_SSH_KEY}" ]; then
            echo "::error title=Missing EC2_SSH_KEY secret::Set EC2_SSH_KEY to the full contents of your .pem private key."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s' "${EC2_SSH_KEY}" | sed 's/\\n/\n/g' > ~/.ssh/ec2_deploy_key
          printf '\n' >> ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keygen -y -f ~/.ssh/ec2_deploy_key > /dev/null

          if ! ssh-keyscan -H -T 30 "${EC2_HOST}" >> ~/.ssh/known_hosts; then
            echo "::error title=EC2 SSH is not reachable::GitHub Actions could not reach port 22 on ${EC2_HOST}. Check EC2_HOST and allow SSH from the GitHub runner, or deploy with a self-hosted runner on EC2."
            exit 1
          fi

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          EC2_USER="${EC2_USER:-ubuntu}"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=4 -i ~/.ssh/ec2_deploy_key "${EC2_USER}@${EC2_HOST}" <<'EOF'
            set -euo pipefail

            APP_DIR="$HOME/ask-your-data-agent"
            REPO_URL="https://github.com/Munish643/ask-your-data-agent.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            if docker info >/dev/null 2>&1; then
              compose() { docker compose --project-name ask-your-data-agent "$@"; }
              docker_cmd() { docker "$@"; }
            else
              compose() { sudo docker compose --project-name ask-your-data-agent "$@"; }
              docker_cmd() { sudo docker "$@"; }
            fi

            compose down --remove-orphans || true
            stale_containers="$(docker_cmd ps -aq --filter "name=ask-your-data-agent" || true)"
            if [ -n "$stale_containers" ]; then
              docker_cmd rm -f $stale_containers
            fi

            compose up --build -d --remove-orphans
            compose ps

            if docker info >/dev/null 2>&1; then
              docker image prune -f
            else
              sudo docker image prune -f
            fi
          EOF
